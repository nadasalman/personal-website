  summary: >
   

   I hold a PhD in medical robotics, specializing in the development of adaptive upper-limb exoskeletons for children with neuromuscular disorders. During my doctoral research, I led the prototyping and experimental validation of several robotic platforms, covering everything from mechanical design and actuator integration to the development of control architectures and testing with over 20 healthy participants.
   I have developed solid expertise in robotic modeling and control, embedded systems, human-robot interaction, and user-in-the-loop experimentation. These experiences have fostered a high degree of autonomy, strong analytical skills, and a pragmatic approach tailored to the constraints of real-world robotic systems.

